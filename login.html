<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <style>
    /* Tambahan style untuk show password */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .password-wrapper input {
      flex: 1;
      padding-right: 45px;
    }
    
    .toggle-password {
      position: absolute;
      right: 12px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toggle-password:hover {
      color: #3b82f6;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="img/logo.png" alt="Logo" />
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk untuk mengakses dashboard monitoring Anda</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-password" id="togglePassword">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" /> Ingat saya
          </label>
          <a href="#" class="link">Lupa password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <p id="loginMessage" class="form-message"></p>
        <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>
      </form>
    </div>

    <div class="login-art">
      <div class="art-content">
        <h2>Monitoring <br/>Lebih Cerdas</h2>
        <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
      </div>
    </div>
  </div>

  <!-- Font Awesome untuk ikon mata -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <script type="module" src="js/auth.js"></script>
  
  <!-- Script untuk show password -->
  <script>
    // Script untuk toggle show/hide password
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', function() {
        // Toggle tipe input antara 'password' dan 'text'
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Ganti ikon mata
        const icon = this.querySelector('i');
        if (icon) {
          icon.classList.toggle('fa-eye-slash');
          icon.classList.toggle('fa-eye');
        }
      });
    }
  </script>
</body>
</html>
