<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.login-body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrapper {
      display: flex;
      max-width: 1000px;
      width: 100%;
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .login-card {
      flex: 1;
      padding: 48px 40px;
      background: white;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand img {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 16px;
      padding: 10px;
      margin-bottom: 20px;
    }

    .login-brand h1 {
      font-size: 1.75rem;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .login-brand p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .login-form {
      margin-top: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #334155;
      font-size: 0.85rem;
    }

    /* Perbaikan utama: password wrapper */
    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper input {
      width: 100%;
      padding: 12px 45px 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
      background: white;
      outline: none;
    }

    .password-wrapper input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #3b82f6;
    }

    /* Email input styling */
    .form-group input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }

    .form-group input[type="email"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.85rem;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #475569;
    }

    .checkbox input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .link {
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .link:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      border: none;
      font-size: 1rem;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .btn-block {
      width: 100%;
    }

    .form-message {
      margin-top: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #ef4444;
    }

    .form-footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 0.85rem;
    }

    .login-art {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 48px 40px;
      display: flex;
      align-items: flex-end;
      color: white;
    }

    .art-content h2 {
      font-size: 2rem;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .art-content p {
      font-size: 0.95rem;
      opacity: 0.9;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
      }
      .login-art {
        display: none;
      }
      .login-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="img/logo.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27white%27%3E%3Cpath d=%27M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5%27/%3E%3C/svg%3E'">
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk untuk mengakses dashboard monitoring Anda</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-password" id="togglePassword">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" /> Ingat saya
          </label>
          <a href="#" class="link">Lupa password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <p id="loginMessage" class="form-message"></p>
        <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>
      </form>
    </div>

    <div class="login-art">
      <div class="art-content">
        <h2>Monitoring <br/>Lebih Cerdas</h2>
        <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
      </div>
    </div>
  </div>

  <script>
    // Script untuk toggle show/hide password
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', function() {
        // Toggle tipe input antara 'password' dan 'text'
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Ganti ikon mata
        const icon = this.querySelector('i');
        if (icon) {
          icon.classList.toggle('fa-eye-slash');
          icon.classList.toggle('fa-eye');
        }
      });
    }

    // Handle form submit
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (email && password) {
          // Redirect ke dashboard setelah login
          window.location.href = "http://127.0.0.1:5500/index.html";
        } else {
          const messageEl = document.getElementById('loginMessage');
          messageEl.textContent = 'Harap isi email dan password!';
        }
      });
    }
  </script>
</body>
</html>
